name: Deploy to Firebase

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write Firebase credentials
        id: credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CAMAS_ELASTICAS_171FC }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Missing FIREBASE_SERVICE_ACCOUNT_CAMAS_ELASTICAS_171FC secret. Skipping Firebase deploy."
            exit 0
          fi

          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-service-account.json"
          test -s "$RUNNER_TEMP/firebase-service-account.json"
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Deploy Hosting and Firestore
        if: steps.credentials.outputs.configured == 'true'
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: firebase deploy --project camas-elasticas-171fc --only hosting,firestore:rules,firestore:indexes --non-interactive
