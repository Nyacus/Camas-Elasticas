<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Camas Elásticas</title>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background-color: rgb(237, 237, 237);
    font-family: 'Roboto', sans-serif;
  }
  body {
    display: flex;
    flex-direction: column;
  }
  .app-header {
    flex: 0 0 auto;
    min-height: 72px;
    padding: 10px 20px 0;
    display: grid;
    grid-template-columns: minmax(170px, 1fr) minmax(240px, 1.4fr) auto;
    gap: 12px;
    align-items: center;
  }
  .park-control,
  .daily-summary,
  .firebase-status {
    min-height: 56px;
    border: 2px solid #000;
    border-radius: 14px;
    background: #fff;
    box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.25);
  }
  .park-control {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 10px;
    align-items: center;
    padding: 8px 12px;
  }
  .park-control label {
    font-weight: 900;
    color: #222;
  }
  #park-select {
    min-width: 0;
    width: 100%;
    border: 1px solid #D1D5DB;
    border-radius: 10px;
    padding: 8px 10px;
    font-size: 1rem;
    font-family: inherit;
    background: #F9FAFB;
  }
  .daily-summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    overflow: hidden;
  }
  .summary-item {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 6px 8px;
    border-left: 1px solid #E5E7EB;
    text-align: center;
  }
  .summary-item:first-child {
    border-left: 0;
  }
  .summary-value {
    font-size: 1.25rem;
    font-weight: 900;
    color: #111827;
    line-height: 1;
  }
  .summary-label {
    margin-top: 4px;
    font-size: 0.78rem;
    font-weight: 700;
    color: #4B5563;
  }
  .firebase-status {
    min-width: 92px;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 8px 12px;
    font-size: 0.82rem;
    font-weight: 900;
    color: #374151;
  }
  .firebase-status.online {
    color: #14532D;
    background: #DCFCE7;
  }
  .firebase-status.error {
    color: #7F1D1D;
    background: #FEE2E2;
  }
  .grid-container {
    display: grid;
    grid-template-columns: 1fr max(0px, calc(4vw - 16px)) 1fr;
    grid-template-rows: repeat(3, 1fr) max(0px, calc(4vw - 16px)) repeat(3, 1fr);
    flex: 1 1 auto;
    min-height: 0;
    height: auto;
    width: 100vw;
    gap: 8px;
    padding: 20px;
  }
  .timer {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 8%;
    font-size: 2.5em;
    background-color: #FFF;
    border: 2px solid #000;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    touch-action: manipulation;
    border-radius: 20px;
    box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.4);
  }
  .indicator {
    position: absolute;
    top: 80%;
    left: 50%;
    transform: translate(-50%, -50%);
    height: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 4px;
  }
  .indicator .material-symbols-outlined {
    font-size: 38px;
  }
  .indicator i {
    font-size: 36px;
    vertical-align: middle;
  }
  .timer-number {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 30px;
    color: black;
    pointer-events: none;
  }
  .flashback-indicator {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 36px;
    color: rgba(0, 0, 0,0.15);
    pointer-events: none;
  }
  .timer[data-timer-id="1"] { grid-column: 1; grid-row: 1; }
  .timer[data-timer-id="2"] { grid-column: 3; grid-row: 1; }
  .timer[data-timer-id="3"] { grid-column: 1; grid-row: 2; }
  .timer[data-timer-id="4"] { grid-column: 3; grid-row: 2; }
  .timer[data-timer-id="5"] { grid-column: 1; grid-row: 3; }
  .timer[data-timer-id="6"] { grid-column: 3; grid-row: 3; }
  .timer[data-timer-id="7"] { grid-column: 1; grid-row: 5; }
  .timer[data-timer-id="8"] { grid-column: 3; grid-row: 5; }
  .timer[data-timer-id="9"] { grid-column: 1; grid-row: 6; }
  .timer[data-timer-id="10"] { grid-column: 3; grid-row: 6; }
  .timer[data-timer-id="11"] { grid-column: 1; grid-row: 7; }
  .timer[data-timer-id="12"] { grid-column: 3; grid-row: 7; }
  .inactive {
    background-color: transparent;
  }
  @keyframes shake {
    0% { transform: rotate(0deg); }
    25% { transform: rotate(3deg); }
    50% { transform: rotate(0deg); }
    75% { transform: rotate(-3deg); }
    100% { transform: rotate(0deg); }
  }
  .shaking {
    animation: shake 150ms infinite;
  }
  .modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.5);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    padding: 16px; /* separa el contenido del borde */
  }
  .modal-content {
    background-color: white;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    width: min(90vw, 360px);
    max-width: 90vw;
    max-height: 90vh;
    overflow: auto;
  }
  .modal-content ul {
    list-style: none;
    padding: 0;
  }
  .modal-content li {
    padding: 15px 10px;
    cursor: pointer;
    font-size: 2.0em;
    display: flex;
    align-items: center;
    text-align: left;
    background-color: #f5f5f5;
    margin-bottom: 10px;
    border-radius: 20px;
  }
  .modal-content li:hover {
    background-color: #f0f0f0;
  }
  .modal-content li i {
    font-size: 35px;
    margin-right: 45px;
    vertical-align: middle;
    margin-left: 15px;
    width: 40px;
    text-align: center;
  }
  .modal-content li:active {
    background-color: #e0e0e0;
    border: 2px #000;
  }
  #modal-title {
    text-align: center;
    margin-bottom: 20px;
    font-size: 1.8em;
    font-weight: 700;
    color: #333;
  }
  .edit-modal-content {
    background-color: white;
    padding: 15px;
    border-radius: 20px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    width: min(90vw, 360px);
    height: auto;                 /* evita forzar altura fija */
    max-width: 90vw;
    max-height: 90vh;
    overflow: auto;               /* permite scroll interno si hiciera falta */
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .time-display {
    width: 100%;
    height: 50px;
    background-color: #f5f5f5;
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 2em;
    margin-bottom: 15px;
    font-family: 'Roboto', sans-serif;
  }
  .numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: 100%;
  }
  .numpad button {
    padding: 15px;
    font-size: 1.5em;
    background-color: #f5f5f5;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Roboto', sans-serif;
  }
  .numpad button:hover {
    background-color: #f0f0f0;
  }
  .numpad button:active {
    background-color: #e0e0e0;
  }
  .numpad .action-btn {
    font-size: 1.2em;
  }
  .share-modal-content {
    background-color: white;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    width: 80%;
    max-width: 400px;
    text-align: center;
    max-height: 90vh;
    overflow: auto;
  }
  .share-modal-content p {
    margin-bottom: 15px;
    font-size: 1.2em;
  }
  .share-modal-content input {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    font-size: 1em;
    border: 1px solid #ccc;
    border-radius: 5px;
    box-sizing: border-box;
  }
  .share-modal-content button {
    padding: 10px 20px;
    font-size: 1em;
    background-color: #f5f5f5;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin: 0 10px;
  }
  .share-modal-content button:hover {
    background-color: #f0f0f0;
  }
  .share-modal-content button:active {
    background-color: #e0e0e0;
  }
  .count-modal-content {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background-color: white;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    text-align: center;
    min-width: 300px;
    min-height: 150px;
    width: min(90vw, 380px);
    max-width: 90vw;
    max-height: 90vh;
    overflow: auto;
  }
  #count-modal-title {
    font-size: 1.8em;
    font-weight: 700;
    color: #333;
    margin-bottom: 15px;
  }
  .count-display-container {
    display: flex;
    justify-content: center;
    align-items: center;
  }
  #count-display {
    font-size: 6em;
    font-weight: 900;
    font-family: 'Roboto', sans-serif;
    color: #333;
  }
  #lollipop-icon {
    display: none;
    margin-right: 25px;
  }
  .lollipop-head {
    width: 80px;
    height: 80px;
    background-color: #ff0000;
    border-radius: 50%;
    border: 2px solid #ff0000;
    box-shadow: inset 5px -5px 15px rgba(0,0,0,0.55);
  }
  .lollipop-stick {
    width: 10px;
    height: 75px;
    background: rgb(230, 230, 230);
    border: 0px solid #000;
    margin: 0 auto;
    border-top: none;
  }
  .count-display-green {
    color: #28a745;
  }
  .auth-modal-content {
    background-color: white;
    padding: 18px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,.12);
    width: min(88vw, 340px);
    max-width: 90vw;
    border: 1px solid #E5E7EB;
  }
  .auth-modal-content h2 {
    margin-bottom: 12px;
    text-align: center;
    font-size: 1.5rem;
    font-weight: 900;
  }
  .auth-modal-content input {
    width: 100%;
    margin-bottom: 10px;
    padding: 11px 12px;
    border: 1px solid #D1D5DB;
    border-radius: 10px;
    font-size: 1rem;
    font-family: inherit;
  }
  .auth-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .auth-actions button {
    padding: 11px 12px;
    border: 0;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 900;
    font-family: inherit;
    cursor: pointer;
  }
  #auth-login-btn {
    background: #111827;
    color: #fff;
  }
  #auth-local-btn {
    background: #F3F4F6;
    color: #111827;
  }
  #auth-error {
    min-height: 18px;
    margin-top: 10px;
    color: #B91C1C;
    font-size: 0.86rem;
    font-weight: 700;
    text-align: center;
  }

  /* =============================== */
  /* THEME A: Material Compact + Ripple (override final) */
  :root{
    --md-surface:#ffffff;
    --md-on-surface:#1f1f1f;
    --md-border:#E5E7EB;
    --md-primary:#6750A4;
    --md-state:rgba(103,80,164,0.08);
  }
  /* Limita y moderniza todos los contenedores de modal */
  .modal{ padding:12px; }
  .modal-content{
    width:min(88vw,330px);
    max-height:88vh; /* < 90% viewport */
    background:var(--md-surface);
    border:1px solid var(--md-border);
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,.12);
    padding:14px;
  }
  #modal-title{
    font-size:1.8rem;
    font-weight:800;
    letter-spacing:.2px;
    margin:4px 0 10px;
    color:var(--md-on-surface);
  }
  .modal-content ul{ margin-top:4px; }
  .modal-content li{
    position:relative;
    font-size:1.6rem;           /* más compacto */
    padding:10px 12px;
    margin-bottom:8px;
    border-radius:12px;
    background:#FAFAFA;
    border:1px solid var(--md-border);
    transition:transform .06s ease, background .15s ease, border-color .15s ease;
    min-height:44px;             /* toque cómodo */
  }
  .modal-content li i{
    font-size:24px;              /* icono más pequeño */
    margin:0 30px 0 6px;
    width:24px;
    color:#5E5E5E;
  }
  .modal-content li:hover{
    background:#F5F5F5;
    border-color:#DADDE3;
  }
  .modal-content li:active{ transform:scale(.98); }
  /* Ripple visual */
  .modal-content li::after{
    content:'';
    position:absolute; inset:0;
    background:radial-gradient(120px 120px at var(--x,50%) var(--y,50%), var(--md-state), transparent 60%);
    opacity:0; transition:opacity .25s ease; border-radius:inherit;
  }
  .modal-content li:active::after{ opacity:1; }

  /* Otros modales alineados al tema */
  .edit-modal-content{
    width:min(88vw,330px); max-height:88vh; padding:16px; border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,.12); border:1px solid var(--md-border);
    background:var(--md-surface);
  }
  .share-modal-content{
    width:min(88vw,360px); max-height:88vh; border-radius:16px; padding:16px;
    border:1px solid var(--md-border); box-shadow:0 10px 30px rgba(0,0,0,.12);
    background:var(--md-surface);
  }
  .count-modal-content{
    width:min(88vw,340px); max-height:88vh; border-radius:16px; padding:16px;
    border:1px solid var(--md-border); box-shadow:0 10px 30px rgba(0,0,0,.12);
    background:var(--md-surface);
  }
  .time-display{ height:48px; font-size:1.4rem; }
  .numpad button{ padding:12px; font-size:1.15rem; }
  .share-modal-content p{ font-size:1rem; }
  .share-modal-content input{ padding:9px; }
  .share-modal-content button{ padding:9px 14px; }
  #count-display{ font-size:4.6rem; } /* reduce para respirar */

  @media (max-width: 380px) {
    #modal-title,
    #count-modal-title { font-size: 1.1rem; }
    .modal-content li { font-size: 0.98rem; padding: 9px 10px; }
    .modal-content li i{ font-size:20px; width:20px; margin:0 10px 0 6px; }
  }
  @media (max-width: 720px) {
    .app-header {
      grid-template-columns: 1fr;
      padding: 8px 12px 0;
      gap: 8px;
    }
    .park-control,
    .daily-summary,
    .firebase-status {
      min-height: 44px;
      border-radius: 10px;
    }
    .firebase-status {
      justify-content: flex-start;
    }
    .summary-value {
      font-size: 1rem;
    }
    .summary-label {
      font-size: 0.68rem;
    }
    .grid-container {
      padding: 12px;
    }
  }
  @media (max-width: 1000px) and (orientation: portrait) {
    body[data-park-layout="vertical-split"] .timer {
      font-size: clamp(3.1rem, 12vw, 4.6rem);
      padding-top: 7%;
    }
    body[data-park-layout="vertical-split"] .timer-number {
      font-size: clamp(2.7rem, 11vw, 4rem);
    }
    body[data-park-layout="vertical-split"] .indicator {
      height: clamp(46px, 11vw, 62px);
    }
    body[data-park-layout="vertical-split"] .indicator i,
    body[data-park-layout="vertical-split"] .indicator .material-symbols-outlined {
      font-size: clamp(42px, 10vw, 58px);
    }
    body[data-park-layout="vertical-split"] .flashback-indicator {
      font-size: clamp(42px, 10vw, 58px);
    }
  }
</style>

      <li data-action="count"><i class="fa-solid fa-calculator"></i> Saltómetro</li>

<div id="edit-modal" class="modal" style="display: none;">

<div id="share-modal" class="modal" style="display: none;">

<div id="count-modal" class="modal" style="display: none;">

      <div id="count-display">0</div>

  </div>
</div>

<div id="auth-modal" class="modal" style="display: none;">
  <div class="auth-modal-content">
    <h2>Acceso</h2>
    <input type="email" id="auth-email" placeholder="Email" autocomplete="username">
    <input type="password" id="auth-password" placeholder="Contraseña" autocomplete="current-password">
    <div class="auth-actions">
      <button id="auth-login-btn">Entrar</button>
      <button id="auth-local-btn">Local</button>
    </div>
    <div id="auth-error"></div>
  </div>
</div>

let remoteSessionsUnsubscribe = null;
let usingRemoteSummary = false;
let authModalDismissed = false;

const currencyFormatter = new Intl.NumberFormat('es-ES', {
  style: 'currency',
  currency: APP_CONFIG.currency
});

function vibrate() {
  if (vibrationsEnabled && navigator.vibrate) {
    navigator.vibrate([100, 50, 100]);
  }
}

function getInitialPark() {
  const urlParams = new URLSearchParams(window.location.search);
  const urlPark = urlParams.get('park');
  const storedPark = localStorage.getItem(PARK_STORAGE_KEY);
  return APP_CONFIG.parks[urlPark] || APP_CONFIG.parks[storedPark] || APP_CONFIG.parks[APP_CONFIG.defaultParkId];
}

function getTimersStorageKey() {
  return `timers:${currentPark.id}`;
}

function getTodayKey(date = new Date()) {
  const parts = new Intl.DateTimeFormat('es-ES', {
    timeZone: APP_CONFIG.timezone,
    year: 'numeric',
    month: '2-digit',
    day: '2-digit'
  }).formatToParts(date);
  const values = {};
  parts.forEach(part => {
    values[part.type] = part.value;
  });
  return `${values.year}-${values.month}-${values.day}`;
}

function getDurationMinutes(durationSeconds) {
  return Math.round(durationSeconds / 60);
}

function getPriceForDuration(durationSeconds) {
  const durationMinutes = getDurationMinutes(durationSeconds);
  return Number(currentPark.prices[durationMinutes] || 0);
}

function createSessionId() {
  if (window.crypto && typeof window.crypto.randomUUID === 'function') {
    return window.crypto.randomUUID();
  }
  return `session-${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
}

function readLocalSessions() {
  try {
    return JSON.parse(localStorage.getItem(SESSIONS_STORAGE_KEY)) || [];
  } catch (e) {
    console.error('Error leyendo sesiones locales:', e);
    return [];
  }
}

function writeLocalSessions(sessions) {
  localStorage.setItem(SESSIONS_STORAGE_KEY, JSON.stringify(sessions));
}

function saveSessionLocally(session) {
  const sessions = readLocalSessions();
  const existingIndex = sessions.findIndex(item => item.id === session.id);
  if (existingIndex >= 0) {
    sessions[existingIndex] = session;
  } else {
    sessions.push(session);
  }
  writeLocalSessions(sessions);
}

function getLocalSessionsForCurrentParkToday() {
  const today = getTodayKey();
  return readLocalSessions().filter(session => {
    return session.parkId === currentPark.id && session.day === today;
  });
}

function renderDailySummary(sessions) {
  const countedSessions = sessions.filter(session => session.status !== 'replaced');
  const activeSessions = countedSessions.filter(session => session.status === 'active');
  const totalCash = countedSessions.reduce((sum, session) => sum + Number(session.price || 0), 0);

  document.getElementById('today-count').textContent = countedSessions.length;
  document.getElementById('today-cash').textContent = currencyFormatter.format(totalCash);
  document.getElementById('active-count').textContent = activeSessions.length;
}

function updateDailySummaryFromLocal() {
  if (!usingRemoteSummary) {
    renderDailySummary(getLocalSessionsForCurrentParkToday());
  }
}

function setFirebaseStatus(text, state = 'local') {
  const statusEl = document.getElementById('firebase-status');
  if (!statusEl) return;
  statusEl.textContent = text;
  statusEl.classList.toggle('online', state === 'online');
  statusEl.classList.toggle('error', state === 'error');
}

function firebaseIsConfigured() {
  return Boolean(FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.projectId && FIREBASE_CONFIG.appId);
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const existingScript = document.querySelector(`script[src="${src}"]`);
    if (existingScript) {
      resolve();
      return;
    }

    const script = document.createElement('script');
    script.src = src;
    script.onload = resolve;
    script.onerror = reject;
    document.head.appendChild(script);
  });
}

async function initFirebase() {
  if (!firebaseIsConfigured()) {
    setFirebaseStatus('Local', 'local');
    updateDailySummaryFromLocal();
    return;
  }

  try {
    await loadScript(`https://www.gstatic.com/firebasejs/${FIREBASE_SDK_VERSION}/firebase-app-compat.js`);
    await loadScript(`https://www.gstatic.com/firebasejs/${FIREBASE_SDK_VERSION}/firebase-auth-compat.js`);
    await loadScript(`https://www.gstatic.com/firebasejs/${FIREBASE_SDK_VERSION}/firebase-firestore-compat.js`);

    if (!firebase.apps.length) {
      firebase.initializeApp(FIREBASE_CONFIG);
    }

    remoteDb = firebase.firestore();
    firebaseAuth = firebase.auth();
    await firebaseAuth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
    firebaseAuth.onAuthStateChanged(user => {
      if (user) {
        hideAuthModal();
        authModalDismissed = false;
        setFirebaseStatus('Firebase', 'online');
        watchRemoteDailySummary();
      } else {
        usingRemoteSummary = false;
        stopRemoteDailySummary();
        setFirebaseStatus('Login', 'error');
        updateDailySummaryFromLocal();
        if (!authModalDismissed) {
          showAuthModal();
        }
      }
    });
  } catch (e) {
    console.error('No se pudo iniciar Firebase:', e);
    remoteDb = null;
    firebaseAuth = null;
    usingRemoteSummary = false;
    setFirebaseStatus('Local', 'error');
    updateDailySummaryFromLocal();
  }
}

function sanitizeSessionForRemote(session) {
  return JSON.parse(JSON.stringify(session));
}

async function writeSessionToRemote(session) {
  if (!remoteDb || !firebaseAuth || !firebaseAuth.currentUser) return;

  try {
    await remoteDb.collection('sessions').doc(session.id).set({
      ...sanitizeSessionForRemote(session),
      updatedAtMs: Date.now(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
  } catch (e) {
    console.error('No se pudo guardar la sesión en Firestore:', e);
    setFirebaseStatus('Local', 'error');
  }
}

function watchRemoteDailySummary() {
  if (!remoteDb || !firebaseAuth || !firebaseAuth.currentUser) return;
  stopRemoteDailySummary();

  const today = getTodayKey();
  usingRemoteSummary = true;
  remoteSessionsUnsubscribe = remoteDb.collection('sessions')
    .where('parkId', '==', currentPark.id)
    .where('day', '==', today)
    .onSnapshot(snapshot => {
      const sessions = snapshot.docs.map(doc => doc.data());
      renderDailySummary(sessions);
      setFirebaseStatus('Firebase', 'online');
    }, error => {
      console.error('No se pudo leer el resumen remoto:', error);
      usingRemoteSummary = false;
      setFirebaseStatus('Local', 'error');
      updateDailySummaryFromLocal();
    });
}

function stopRemoteDailySummary() {
  if (remoteSessionsUnsubscribe) {
    remoteSessionsUnsubscribe();
    remoteSessionsUnsubscribe = null;
  }
}

function showAuthModal() {
  const modal = document.getElementById('auth-modal');
  if (modal) {
    modal.style.display = 'flex';
  }
}

function hideAuthModal() {
  const modal = document.getElementById('auth-modal');
  if (modal) {
    modal.style.display = 'none';
  }
}

function setupAuthControls() {
  const emailInput = document.getElementById('auth-email');
  const passwordInput = document.getElementById('auth-password');
  const loginBtn = document.getElementById('auth-login-btn');
  const localBtn = document.getElementById('auth-local-btn');
  const errorEl = document.getElementById('auth-error');
  const statusEl = document.getElementById('firebase-status');

  async function submitLogin() {
    if (!firebaseAuth) return;
    errorEl.textContent = '';
    loginBtn.disabled = true;

    try {
      await firebaseAuth.signInWithEmailAndPassword(emailInput.value.trim(), passwordInput.value);
    } catch (e) {
      console.error('No se pudo iniciar sesión:', e);
      errorEl.textContent = 'No se pudo entrar';
    } finally {
      loginBtn.disabled = false;
    }
  }

  loginBtn.onclick = submitLogin;
  localBtn.onclick = () => {
    authModalDismissed = true;
    hideAuthModal();
    setFirebaseStatus('Local', 'local');
  };
  statusEl.onclick = () => {
    if (firebaseIsConfigured() && firebaseAuth && !firebaseAuth.currentUser) {
      authModalDismissed = false;
      showAuthModal();
    }
  };

  [emailInput, passwordInput].forEach(input => {
    input.addEventListener('keydown', event => {
      if (event.key === 'Enter') {
        void submitLogin();
      }
    });
  });
}

function createJumpSession(timerId, durationSeconds) {
  const now = Date.now();
  const session = {
    id: createSessionId(),
    parkId: currentPark.id,
    parkName: currentPark.name,
    bedNumber: Number(timerId),
    currentBedNumber: Number(timerId),
    durationMinutes: getDurationMinutes(durationSeconds),
    durationSeconds,
    price: getPriceForDuration(durationSeconds),
    day: getTodayKey(new Date(now)),
    startedAtMs: now,
    endedAtMs: null,
    elapsedSeconds: 0,
    overrunSeconds: 0,
    status: 'active'
  };

  timers[timerId].activeSessionId = session.id;
  timers[timerId].activeSessionSnapshot = session;
  saveSessionLocally(session);
  void writeSessionToRemote(session);
  updateDailySummaryFromLocal();
}

function updateActiveSession(timerId, changes) {
  const timer = timers[timerId];
  if (!timer || !timer.activeSessionSnapshot) return;

  timer.activeSessionSnapshot = {
    ...timer.activeSessionSnapshot,
    ...changes
  };
  saveSessionLocally(timer.activeSessionSnapshot);
  void writeSessionToRemote(timer.activeSessionSnapshot);
  updateDailySummaryFromLocal();
}

function updateActiveSessionDuration(timerId, durationSeconds) {
  updateActiveSession(timerId, {
    durationMinutes: getDurationMinutes(durationSeconds),
    durationSeconds,
    price: getPriceForDuration(durationSeconds)
  });
}

function updateActiveSessionBed(timerId) {
  updateActiveSession(timerId, {
    currentBedNumber: Number(timerId)
  });
}

function closeJumpSession(timerId, status = 'finished') {
  const timer = timers[timerId];
  if (!timer || !timer.activeSessionSnapshot) return;

  const now = Date.now();
  const startedAtMs = Number(timer.activeSessionSnapshot.startedAtMs || now);
  const elapsedSeconds = Math.max(0, Math.floor((now - startedAtMs) / 1000));
  const session = {
    ...timer.activeSessionSnapshot,
    currentBedNumber: Number(timerId),
    endedAtMs: now,
    elapsedSeconds,
    overrunSeconds: Math.max(0, elapsedSeconds - Number(timer.activeSessionSnapshot.durationSeconds || 0)),
    status
  };

  saveSessionLocally(session);
  void writeSessionToRemote(session);
  timer.activeSessionId = null;
  timer.activeSessionSnapshot = null;
  updateDailySummaryFromLocal();
}

function setupParkSelector() {
  const select = document.getElementById('park-select');
  select.innerHTML = '';

  Object.values(APP_CONFIG.parks).forEach(park => {
    const option = document.createElement('option');
    option.value = park.id;
    option.textContent = `${park.name} (${park.bedCount})`;
    option.selected = park.id === currentPark.id;
    select.appendChild(option);
  });

  select.onchange = () => {
    switchPark(select.value);
  };
}

function switchPark(parkId) {
  const nextPark = APP_CONFIG.parks[parkId];
  if (!nextPark || nextPark.id === currentPark.id) return;

  Object.values(timers).forEach(timer => {
    if (timer.interval) clearInterval(timer.interval);
  });

  currentPark = nextPark;
  localStorage.setItem(PARK_STORAGE_KEY, currentPark.id);
  const url = new URL(window.location.href);
  url.searchParams.set('park', currentPark.id);
  window.history.replaceState({}, '', url);
  setupCurrentPark();

  if (remoteDb) {
    watchRemoteDailySummary();
  }
}

function renderTimerGrid() {
  const grid = document.getElementById('timer-grid');
  grid.innerHTML = '';

  if (currentPark.layout && currentPark.layout.type === 'horizontal-split') {
    renderHorizontalSplitGrid(grid);
    return;
  }

  renderVerticalSplitGrid(grid);
}

function renderVerticalSplitGrid(grid) {
  const totalRows = Math.ceil(currentPark.bedCount / 2);
  const topRows = Math.ceil(totalRows / 2);
  const bottomRows = totalRows - topRows;
  grid.style.gridTemplateColumns = '1fr max(0px, calc(4vw - 16px)) 1fr';
  grid.style.gridTemplateRows = `repeat(${topRows}, 1fr) max(0px, calc(4vw - 16px)) repeat(${bottomRows}, 1fr)`;

  for (let id = 1; id <= currentPark.bedCount; id++) {
    const timerEl = document.createElement('div');
    const baseRow = Math.ceil(id / 2);
    timerEl.className = 'timer';
    timerEl.dataset.timerId = String(id);
    timerEl.style.gridColumn = id % 2 === 1 ? '1' : '3';
    timerEl.style.gridRow = baseRow > topRows ? String(baseRow + 1) : String(baseRow);
    grid.appendChild(timerEl);
  }
}

function renderHorizontalSplitGrid(grid) {
  const layout = currentPark.layout;
  const gapTrack = 'max(0px, calc(4vw - 16px))';
  const columnsBeforeGap = layout.columnSeparatorAfter;
  const columnsAfterGap = layout.columns - columnsBeforeGap;
  const rowsBeforeGap = layout.rowSeparatorAfter;
  const rowsAfterGap = layout.rows - rowsBeforeGap;

  grid.style.gridTemplateColumns = `repeat(${columnsBeforeGap}, 1fr) ${gapTrack} repeat(${columnsAfterGap}, 1fr)`;
  grid.style.gridTemplateRows = `repeat(${rowsBeforeGap}, 1fr) ${gapTrack} repeat(${rowsAfterGap}, 1fr)`;

  for (let id = 1; id <= currentPark.bedCount; id++) {
    const timerEl = document.createElement('div');
    const zeroBased = id - 1;
    const logicalColumn = (zeroBased % layout.columns) + 1;
    const logicalRow = Math.floor(zeroBased / layout.columns) + 1;
    timerEl.className = 'timer';
    timerEl.dataset.timerId = String(id);
    timerEl.style.gridColumn = logicalColumn > columnsBeforeGap ? String(logicalColumn + 1) : String(logicalColumn);
    timerEl.style.gridRow = logicalRow > rowsBeforeGap ? String(logicalRow + 1) : String(logicalRow);
    grid.appendChild(timerEl);
  }
}

function initializeTimers() {
  Object.keys(timers).forEach(id => delete timers[id]);

  document.querySelectorAll('.timer').forEach(timerEl => {
    timerEl.addEventListener('contextmenu', e => e.preventDefault());
    const id = timerEl.dataset.timerId;
    timers[id] = {
      element: timerEl,
      state: 'idle',
      time: 600,
      initialDuration: 600,
      interval: null,
      ascending: false,
      pressTimerMedium: null,
      pressTimerLong: null,
      pressActionTaken: false,
      lastClickTime: 0,
      clickCount: 0,
      doubleClickTimer: null,
      startTime: null,
      flashbackState: null,
      isShowingFlashback: false,
      activeSessionId: null,
      activeSessionSnapshot: null
    };
    timerEl.addEventListener('mousedown', e => handlePressStart(e, id));
    timerEl.addEventListener('mouseup', e => handlePressEnd(e, id));
    timerEl.addEventListener('touchstart', e => handlePressStart(e, id));
    timerEl.addEventListener('touchend', e => handlePressEnd(e, id));
  });
}

function setupCurrentPark() {
  document.body.dataset.parkLayout = currentPark.layout ? currentPark.layout.type : 'vertical-split';
  renderTimerGrid();
  initializeTimers();
  loadTimersFromLocalStorage();
  document.querySelectorAll('.timer').forEach(timerEl => {
    const id = timerEl.dataset.timerId;
    if (timers[id] && !timerEl.hasChildNodes()) {
      updateTimerDisplay(id);
    }
  });
  updateDailySummaryFromLocal();
}

function saveTimersToLocalStorage() {
  const timersToSave = {};
  for (const id in timers) {
    const timerCopy = { ...timers[id] };
    delete timerCopy.element;
    delete timerCopy.interval;
    if (timerCopy.flashbackState) {}
    timersToSave[id] = timerCopy;
  }
  localStorage.setItem(getTimersStorageKey(), JSON.stringify(timersToSave));
}

function loadTimersFromLocalStorage() {
  const urlParams = new URLSearchParams(window.location.search);
  const sharedState = urlParams.get('timers');

  let source = null;
  if (sharedState) {
      try {
          source = JSON.parse(decodeURIComponent(sharedState));
      } catch (e) {
          console.error('Error al cargar estado compartido:', e);
      }
  }
  
  if (!source) {
      try {
          source = JSON.parse(localStorage.getItem(getTimersStorageKey()));
      } catch (e) {
          console.error('Error al cargar temporizadores locales:', e);
      }
  }

  if (!source && currentPark.id === APP_CONFIG.defaultParkId) {
      source = JSON.parse(localStorage.getItem('timers'));
  }

  if (source) {
      for (const id in source) {
          if (timers[id]) {
              Object.assign(timers[id], source[id]);
              updateTimerDisplay(id);
              if (timers[id].state === 'counting') {
                  startTimerInterval(id);
              }
          }
      }
  }
}

function startTimerInterval(id) {
  const timer = timers[id];
  if (timer.interval) clearInterval(timer.interval);

  function updateTimer() {
    const elapsed = Math.floor((Date.now() - timer.startTime) / 1000);
    const remaining = timer.initialDuration - elapsed;

    if (remaining > 0) {
      // Descendente (verde)
      timer.ascending = false;
      timer.time = remaining;
    } else {
      // Ascendente (rojo)
      timer.ascending = true;
      timer.time = Math.abs(remaining) + 1;
    }

    updateTimerDisplay(id);
    saveTimersToLocalStorage();
  }

  timer.interval = setInterval(updateTimer, 1000);
  updateTimer();
}

function bootApp() {
    setupParkSelector();
    setupAuthControls();
    setupCurrentPark();
    void initFirebase();
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', bootApp);
} else {
    bootApp();
}

// ===================================================================
// ========= INICIO DE LA SECCIÓN MODIFICADA =========================
// ===================================================================
function handlePressStart(e, id) {
  e.preventDefault();
  const timer = timers[id];
  timer.pressTarget = e.target;
  timer.pressActionTaken = false;

  const isIndicatorPress = timer.pressTarget.closest('.indicator');

  // Lógica CORREGIDA para el cambio de duración cíclico
  if (isIndicatorPress) {
    if (timer.state === 'idle') return; // No se puede cambiar la duración si el temporizador está inactivo

    // Un único temporizador: si dura >500ms se dispara, si es corto se gestiona en handlePressEnd
    timer.pressTimerMedium = setTimeout(() => {
      timer.pressActionTaken = true;
      let newDuration;
      
      // Lógica cíclica: 10 -> 20 -> 30 -> 10
      if (timer.initialDuration === 600) { // 10 min
        newDuration = 1200; // 20 min
      } else if (timer.initialDuration === 1200) { // 20 min
        newDuration = 1800; // 30 min
      } else { // 30 min (o cualquier otro valor)
        newDuration = 600; // 10 min
      }
      setDuration(id, newDuration);
    }, 500);
    
    return;
  }

  // Pulsación en el cuerpo del temporizador
  if (timer.state === 'idle') {
    timer.pressTimerMedium = setTimeout(() => {
      timer.pressActionTaken = true;
      startTimer(id, 1200);
    }, 500);

    timer.pressTimerLong = setTimeout(() => {
      timer.pressActionTaken = true;
      startTimer(id, 1800);
    }, 1000);

  } else {
    timer.pressTimerMedium = setTimeout(() => {
      timer.pressActionTaken = true;
      showModal(id);
    }, 500);
  }
}
// ===================================================================
// ========= FIN DE LA SECCIÓN MODIFICADA ============================
// ===================================================================

function handlePressEnd(e, id) {
  const timer = timers[id];
  const currentTime = Date.now();

  clearTimeout(timer.pressTimerMedium);
  clearTimeout(timer.pressTimerLong);

  if (timer.pressActionTaken) {
    return;
  }

  timer.clickCount++;

  if (swapSource !== null) {
    if (id === swapSource) {
      cancelSwapMode();
    } else {
      completeSwap(swapSource, id);
    }
    timer.clickCount = 0;
    if (timer.doubleClickTimer) clearTimeout(timer.doubleClickTimer);
    return;
  }

  if (timer.clickCount === 1) {
    timer.doubleClickTimer = setTimeout(() => {
      if (timer.state === 'idle') {
        startTimer(id, 600);
      }
      timer.clickCount = 0;
      timer.lastClickTime = currentTime;
      saveTimersToLocalStorage();
      updateTimerDisplay(id);
    }, 400);
  } else if (timer.clickCount === 2) {
    if (timer.doubleClickTimer) clearTimeout(timer.doubleClickTimer);
    
    timers[id].flashbackState = {
        state: timer.state,
        time: timer.time,
        initialDuration: timer.initialDuration,
        ascending: timer.ascending,
        startTime: timer.startTime
    };
    timers[id].isShowingFlashback = false;

    resetTimer(id, 600);
    timer.clickCount = 0;
    timer.lastClickTime = currentTime;
    saveTimersToLocalStorage();
    updateTimerDisplay(id);
  }
}

function startTimer(id, duration) {
  const timer = timers[id];
  if (timer.activeSessionId && timer.state === 'counting') {
    closeJumpSession(id, 'replaced');
  }
  if (timer.interval) clearInterval(timer.interval);
  timer.time = duration;
  timer.initialDuration = duration;
  timer.startTime = Date.now();
  timer.ascending = false;
  timer.state = 'counting';
  timer.isShowingFlashback = false;
  createJumpSession(id, duration);
  updateTimerDisplay(id);
  startTimerInterval(id);
  saveTimersToLocalStorage();
}

function resetTimer(id, duration) {
  const timer = timers[id];
  if (timer.activeSessionId && timer.state === 'counting') {
    closeJumpSession(id, 'finished');
  }
  if (timer.interval) clearInterval(timer.interval);
  timer.initialDuration = duration;
  timer.startTime = Date.now();
  timer.time = duration;
  timer.ascending = false;
  timer.state = 'idle';
  timer.element.style.backgroundColor = '';
  updateTimerDisplay(id);
  saveTimersToLocalStorage();
}

// ====== FUNCIÓN MODIFICADA ======
function setDuration(id, newDuration) {
  const timer = timers[id];
  timer.initialDuration = newDuration;

  // Recalcular sentido y tiempo en función del nuevo objetivo
  const elapsed = Math.floor((Date.now() - timer.startTime) / 1000);
  const remaining = newDuration - elapsed;

  if (remaining > 0) {
    // Hay cuenta atrás pendiente → descendente (verde)
    timer.ascending = false;
    timer.time = remaining;
  } else {
    // Ya hemos rebasado el nuevo cero → ascendente (rojo)
    timer.ascending = true;
    timer.time = Math.abs(remaining) + 1; // mantenemos tu +1
  }

  updateActiveSessionDuration(id, newDuration);
  updateTimerDisplay(id);
  saveTimersToLocalStorage();
}

function updateTimerDisplay(id) {
  const timer = timers[id];

  if (timer.state === 'idle') {
    timer.element.innerHTML = `<div class="timer-number">${id}</div>`;
    timer.element.classList.add('inactive');
    timer.element.style.backgroundColor = '';
    return;
  }

  timer.element.classList.remove('inactive');
  let minutes = Math.floor(Math.abs(timer.time) / 60);
  let seconds = Math.abs(timer.time) % 60;
  minutes = minutes.toString();
  seconds = seconds.toString().padStart(2, "0");
  
  let timerHTML = `<span class="timeDigits">${minutes}:${seconds}</span>`;

  if (timer.isShowingFlashback) {
    timerHTML += `<div class="flashback-indicator"><i class="fa-solid fa-backward-fast"></i></div>`;
  }
  
  timer.element.innerHTML = timerHTML;

  let indicatorContainer = timer.element.querySelector('.indicator');
  if (!indicatorContainer) {
    timer.element.insertAdjacentHTML('beforeend', `<div class="indicator"></div>`);
    indicatorContainer = timer.element.querySelector('.indicator');
  }

  let iconHTML = '';
  if (timer.initialDuration === 600) { // 10 min
    iconHTML = '<i class="fa-regular fa-clock" style="opacity: 0.15;"></i>';
  } else if (timer.initialDuration === 1200) { // 20 min
    iconHTML = '<i class="fa-regular fa-clock"></i>';
  } else if (timer.initialDuration === 1800) { // 30 min
    iconHTML = '<i class="fa-solid fa-clock"></i>';
  }

  indicatorContainer.innerHTML = iconHTML;

  if (timer.state === 'counting') {
    timer.element.style.backgroundColor = timer.ascending
      ? 'rgba(255, 0, 0, 0.3)'
      : 'rgba(0, 128, 0, 0.3)';
  }
}

function enableSwapMode(timerId) {
  swapSource = timerId;
  for (const id in timers) {
    if (id !== timerId) {
      timers[id].element.classList.add('shaking');
    }
  }
}

function cancelSwapMode() {
  for (const id in timers) {
    timers[id].element.classList.remove('shaking');
  }
  swapSource = null;
}

function completeSwap(sourceId, targetId) {
  const timerA = timers[sourceId];
  const timerB = timers[targetId];
  const properties = ["state", "time", "initialDuration", "ascending", "startTime", "lastClickTime", "flashbackState", "isShowingFlashback", "activeSessionId", "activeSessionSnapshot"];
  for (let prop of properties) {
    [timerA[prop], timerB[prop]] = [timerB[prop], timerA[prop]];
  }
  if (timerA.interval) clearInterval(timerA.interval);
  if (timerB.interval) clearInterval(timerB.interval);
  
  updateActiveSessionBed(sourceId);
  updateActiveSessionBed(targetId);
  updateTimerDisplay(sourceId);
  updateTimerDisplay(targetId);
  
  if (timerA.state === 'counting') startTimerInterval(sourceId);
  if (timerB.state === 'counting') startTimerInterval(targetId);
  
  cancelSwapMode();
  saveTimersToLocalStorage();
}

function showModal(timerId) {
  const modal = document.getElementById('timer-modal');
  const modalTitle = document.getElementById('modal-title');
  
  modalTitle.textContent = `Cama Elástica Nº${timerId}`;

  modal.dataset.timerId = timerId;
  modal.style.display = 'flex';
  const options = modal.querySelectorAll('.modal-content li');
  options.forEach(option => {
    option.onclick = () => {
      const action = option.dataset.action;
      handleModalAction(action, timerId);
    };
  });
}

function closeModal() {
  const modal = document.getElementById('timer-modal');
  modal.style.display = 'none';
}

function flashbackTimer(timerId) {
    const timer = timers[timerId];
    if (!timer.flashbackState) {
        console.log('No flashback state to restore.');
        return;
    }

    const currentState = {
        state: timer.state,
        time: timer.time,
        initialDuration: timer.initialDuration,
        ascending: timer.ascending,
        startTime: timer.startTime
    };

    Object.assign(timer, timer.flashbackState);
    timer.flashbackState = currentState;
    
    timer.isShowingFlashback = !timer.isShowingFlashback;

    if (timer.interval) clearInterval(timer.interval);
    
    updateTimerDisplay(timerId);
    if (timer.state === 'counting') {
        startTimerInterval(timerId);
    }
    
    saveTimersToLocalStorage();
}

function handleModalAction(action, timerId) {
  switch (action) {
    case 'swap':
      if (!swapSource) {
        enableSwapMode(timerId);
      } else if (swapSource !== timerId) {
        completeSwap(swapSource, timerId);
      }
      closeModal();
      break;
    case 'flashback':
      flashbackTimer(timerId);
      closeModal();
      break;
    case 'edit':
      showEditModal(timerId);
      closeModal();
      break;
    case 'share':
      shareTimerState(timerId);
      break;
    case 'count':
      showCountModal(timerId);
      closeModal();
      break;
  }
}

document.getElementById('timer-modal').addEventListener('click', (e) => {
  if (e.target.classList.contains('modal')) {
    closeModal();
  }
});

let currentInput = '';

const editModal = document.getElementById('edit-modal');
const numButtons = editModal.querySelectorAll('.numpad button[data-value]');
numButtons.forEach(button => {
  button.addEventListener('click', () => {
    if (currentInput.length < 4) {
      currentInput += button.dataset.value;
      updateTimeDisplayNumpad();
    }
  });
});

document.getElementById('delete-btn').addEventListener('click', () => {
  currentInput = currentInput.slice(0, -1);
  updateTimeDisplayNumpad();
});

document.getElementById('accept-btn').addEventListener('click', () => {
  const timerId = editModal.dataset.timerId;
  const duration = calculateDuration(currentInput);
  if (duration > 0) {
    startTimer(timerId, duration);
  }
  closeEditModal();
});

function showEditModal(timerId) {
  editModal.dataset.timerId = timerId;
  editModal.style.display = 'flex';
  currentInput = '';
  updateTimeDisplayNumpad();
}

function closeEditModal() {
  editModal.style.display = 'none';
  currentInput = '';
}

function updateTimeDisplayNumpad() {
  const display = document.getElementById('time-display');
  let minutes = '00';
  let seconds = '00';

  if (currentInput.length === 0) {
    display.textContent = '00:00';
    return;
  }

  if (currentInput.length <= 2) {
    minutes = currentInput.padStart(2, '0');
  } else {
    minutes = currentInput.slice(0, 2);
    seconds = currentInput.slice(2).padStart(2, '0');
  }

  display.textContent = `${minutes}:${seconds}`;
}

function calculateDuration(input) {
  let minutes = 0;
  let seconds = 0;

  if (input.length === 0) return 0;

  if (input.length <= 2) {
    minutes = parseInt(input.padStart(2, '0'), 10);
  } else {
    minutes = parseInt(input.slice(0, 2), 10);
    seconds = parseInt(input.slice(2).padStart(2, '0'), 10);
  }

  return (minutes * 60) + seconds;
}

document.getElementById('edit-modal').addEventListener('click', (e) => {
  if (e.target.classList.contains('modal')) {
    closeEditModal();
  }
});

function shareTimerState(timerId) {
  const shareData = {};
  for (const id in timers) {
    const timerCopy = { ...timers[id] };
    delete timerCopy.element;
    delete timerCopy.interval;
    shareData[id] = timerCopy;
  }

  try {
    const encodedData = encodeURIComponent(JSON.stringify(shareData));
    const shareUrl = `${window.location.origin}${window.location.pathname}?timers=${encodedData}`;

    if (navigator.share) {
      navigator.share({
        title: 'Estado de Temporizadores',
        text: 'Aquí tienes el estado actual de mis temporizadores:',
        url: shareUrl
      }).then(() => {
        closeModal();
      }).catch(err => {
        copyToClipboard(shareUrl);
      });
    } else {
      copyToClipboard(shareUrl);
    }
  } catch (e) {
    console.error('Error generando URL:', e);
  }
}

function copyToClipboard(url) {
  navigator.clipboard.writeText(url).then(() => {
    alert('URL copiada al portapapeles');
    closeModal();
  }).catch(err => {
    showShareModal(url);
  });
}

function showShareModal(url) {
  const shareModal = document.getElementById('share-modal');
  const shareUrlInput = document.getElementById('share-url');
  const copyBtn = document.getElementById('copy-btn');
  const closeBtn = document.getElementById('close-share-btn');

  shareUrlInput.value = url;
  shareModal.style.display = 'flex';

  copyBtn.onclick = () => {
    navigator.clipboard.writeText(url).then(() => {
      alert('URL copiada al portapapeles');
      shareModal.style.display = 'none';
    }).catch(err => {
      alert('No se pudo copiar. Selecciona y copia la URL manualmente.');
      shareUrlInput.select();
    });
  };

  closeBtn.onclick = () => {
    shareModal.style.display = 'none';
  };

  shareModal.onclick = (e) => {
    if (e.target === shareModal) {
      shareModal.style.display = 'none';
    }
  };
}

function formatNumberWithDots(num) {
  return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}

function animateCountUp(displayElement, iconElement, endValue, duration) {
  let startTime = null;

  function step(timestamp) {
    if (!startTime) startTime = timestamp;
    const elapsedTime = timestamp - startTime;
    const progress = Math.min(elapsedTime / duration, 1);
    const easedProgress = progress * progress;
    const currentValue = Math.floor(easedProgress * endValue);

    displayElement.textContent = formatNumberWithDots(currentValue);

    if (currentValue > 1000) {
      displayElement.classList.add('count-display-green');
      iconElement.style.display = 'block';
    } else {
      displayElement.classList.remove('count-display-green');
      iconElement.style.display = 'none';
    }

    if (progress < 1) {
      requestAnimationFrame(step);
    } else {
      displayElement.textContent = formatNumberWithDots(endValue);
      if (endValue > 1000) {
        displayElement.classList.add('count-display-green');
        iconElement.style.display = 'block';
      }
    }
  }

  requestAnimationFrame(step);
}

function showCountModal(timerId) {
  const timer = timers[timerId];
  if (!timer || timer.state === 'idle') {
    alert("Debes iniciar el temporizador antes de poder usar la función 'Contar'.");
    return;
  }

  const countModal = document.getElementById('count-modal');
  const countTitle = document.getElementById('count-modal-title');
  const countDisplay = document.getElementById('count-display');
  const lollipopIcon = document.getElementById('lollipop-icon');

  countTitle.textContent = `Cama Elástica Nº${timerId}`;

  const elapsedSeconds = Math.floor((Date.now() - timer.startTime) / 1000);
  const targetValue = Math.round(elapsedSeconds * Math.sqrt(3));

  countDisplay.textContent = '0';
  countDisplay.classList.remove('count-display-green');
  lollipopIcon.style.display = 'none';

  countModal.style.display = 'flex';
  animateCountUp(countDisplay, lollipopIcon, targetValue, 3000);

  countModal.onclick = () => {
    countModal.style.display = 'none';
  };
}
